# Claude Code — Caller（本リポジトリ用）
#
# Reusable Workflow（claude.yml）の動作確認用 caller。
# 同一リポ内のローカル参照を使用する。

name: Claude Code (Caller)

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: github.actor == 'becky3'
    uses: ./.github/workflows/claude.yml
    with:
      allowed_user: becky3
      auto_progress_prompt: "GA環境専用ルールが .claude/CLAUDE-auto-progress.md にあります。このファイルを必ず読んでから作業を開始してください。ファイルが見つからない・読めない場合は、その旨をIssue/PRにコメントして作業を中断してください。"
    secrets: inherit
