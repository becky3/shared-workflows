# Post Merge — Caller（本リポジトリ用）
#
# Reusable Workflow（post-merge.yml）の動作確認用 caller。
# 同一リポ内のローカル参照を使用する。
# 設計書: docs/specs/auto-progress.md

name: Post Merge (Caller)

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

on:
  pull_request:
    types: [closed]

jobs:
  post-merge:
    if: >-
      github.event.pull_request.merged == true
      && contains(github.event.pull_request.labels.*.name, 'auto:merged')
    uses: ./.github/workflows/post-merge.yml
