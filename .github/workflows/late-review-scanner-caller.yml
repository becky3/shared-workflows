# Late Review Scanner — Caller（本リポジトリ用）
#
# Reusable Workflow（late-review-scanner.yml）の caller。
# 同一リポ内のローカル参照を使用する。

name: Late Review Scanner (Caller)

permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scan:
    uses: ./.github/workflows/late-review-scanner.yml
    with:
      scan_hours: 24
    secrets: inherit
