# Claude Code — Reusable Workflow
#
# Claude Code Action を使用した2つの機能を提供:
#   1. @claude メンションによる対話型コードレビュー・質問応答
#   2. auto-implement ラベルによる自動実装
#
# 呼び出し側の要件:
#   - permissions: contents: write, pull-requests: write, issues: write, id-token: write
#   - secrets: CLAUDE_CODE_OAUTH_TOKEN, REPO_OWNER_PAT
#   - トリガーイベント: issue_comment, pull_request_review_comment, issues, pull_request_review

name: Claude Code

on:
  workflow_call:
    inputs:
      allowed_user:
        description: 'GitHub username allowed to trigger the workflow'
        required: true
        type: string
      model:
        description: 'Claude model to use'
        required: false
        type: string
        default: 'claude-opus-4-6'
      max_turns:
        description: 'Maximum conversation turns'
        required: false
        type: number
        default: 100
      bot_name:
        description: 'Bot display name for claude-code-action'
        required: false
        type: string
        default: 'claude[bot]'
      bot_id:
        description: 'Bot ID for claude-code-action'
        required: false
        type: string
        default: '209825114'
      auto_progress_prompt:
        description: 'Custom instructions injected via prompt input as <custom_instructions> (empty to skip)'
        required: false
        type: string
        default: ''
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      REPO_OWNER_PAT:
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # @claude メンションによる手動トリガー
  claude:
    if: |
      github.actor == inputs.allowed_user && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'issues' && github.event.action != 'labeled' && contains(github.event.issue.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@5994afaaa7f44611addc97a696a135acff5fd218 # v1.0.46
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # REPO_OWNER_PAT を使用: GITHUB_TOKEN で作成されたPRイベントでは
          # 他ワークフローが再トリガーされないため（GitHub の無限ループ防止仕様）
          github_token: ${{ secrets.REPO_OWNER_PAT }}
          bot_name: ${{ inputs.bot_name }}
          bot_id: ${{ inputs.bot_id }}
          claude_args: |
            --model ${{ inputs.model }} --max-turns ${{ inputs.max_turns }} --dangerously-skip-permissions
          prompt: ${{ inputs.auto_progress_prompt }}
          track_progress: true
          show_full_output: true

  # auto-implement ラベルによる自動実装トリガー
  claude-auto-implement:
    if: |
      github.actor == inputs.allowed_user &&
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label != null &&
      github.event.label.name == 'auto-implement' &&
      !contains(github.event.issue.labels.*.name, 'auto:failed')
    runs-on: ubuntu-latest
    steps:
      - name: Validate REPO_OWNER_PAT
        run: |
          set -euo pipefail
          if [ -z "$TOKEN" ]; then
            echo "::error::REPO_OWNER_PAT secret is required for auto-implement workflow chaining"
            exit 1
          fi
        env:
          TOKEN: ${{ secrets.REPO_OWNER_PAT }}

      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@5994afaaa7f44611addc97a696a135acff5fd218 # v1.0.46
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # REPO_OWNER_PAT を使用: Copilot 自動レビューのトリガーに必要
          github_token: ${{ secrets.REPO_OWNER_PAT }}
          branch_prefix: "auto/"
          bot_name: ${{ inputs.bot_name }}
          bot_id: ${{ inputs.bot_id }}
          claude_args: |
            --model ${{ inputs.model }} --max-turns ${{ inputs.max_turns }} --dangerously-skip-permissions
          prompt: ${{ inputs.auto_progress_prompt }}
          track_progress: true
          show_full_output: true
          label_trigger: "auto-implement"

      # auto:pipeline ラベルを付与（検索・フィルタ用。ワークフロー制御には使用しない）
      # ワークフロー制御は auto/ ブランチプレフィックスで判定（branch_prefix パラメータ）
      # claude-code-action が作成したPRをIssue番号+ブランチ命名規則で特定
      - name: Add auto:pipeline label to PR
        if: success()
        run: |
          set -euo pipefail
          ISSUE_NUMBER="${{ github.event.issue.number }}"

          # PR検索（最大3回リトライ、5秒間隔）
          # GitHub APIの伝播遅延により、PR作成直後は見つからない可能性がある
          PR_NUMBER=""
          for attempt in 1 2 3; do
            if ! PR_LIST_OUTPUT=$(gh pr list --state open --limit 100 --json number,headRefName,createdAt 2>&1); then
              echo "::warning::Failed to list PRs (attempt $attempt/3): $PR_LIST_OUTPUT"
              if [ "$attempt" -lt 3 ]; then sleep 5; continue; fi
              echo "::warning::Failed to list PRs after 3 attempts. auto:pipeline label not added."
              exit 0
            fi

            # createdAt でソートし最新のPRを選択（同一Issue番号の複数PR対策）
            # jq 失敗時は stderr をキャプチャしてエラーと「該当なし」を区別する
            if ! JQ_OUTPUT=$(echo "$PR_LIST_OUTPUT" | jq -r \
              "[.[] | select(.headRefName | startswith(\"auto/issue-${ISSUE_NUMBER}-\"))] | sort_by(.createdAt) | .[-1].number // empty" 2>&1); then
              echo "::warning::jq filtering failed (attempt $attempt/3): $JQ_OUTPUT"
              if [ "$attempt" -lt 3 ]; then sleep 5; continue; fi
              echo "::warning::jq filtering failed after 3 attempts. auto:pipeline label not added."
              exit 0
            fi
            PR_NUMBER="$JQ_OUTPUT"

            if [ -n "$PR_NUMBER" ]; then
              echo "Found PR #${PR_NUMBER} (attempt $attempt/3)"
              break
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "::notice::PR not found yet (attempt $attempt/3), retrying in 5 seconds..."
              sleep 5
            fi
          done

          if [ -z "$PR_NUMBER" ]; then
            echo "::warning::Could not find PR for issue #${ISSUE_NUMBER} after 3 attempts. auto:pipeline label not added."
            exit 0
          fi

          # ラベル付与（最大3回リトライ）
          # 失敗してもPR自体は作成済みなので、warningで正常終了する
          for attempt in 1 2 3; do
            if gh pr edit "$PR_NUMBER" --add-label "auto:pipeline"; then
              echo "Added auto:pipeline label to PR #${PR_NUMBER} (attempt $attempt/3)"
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "::notice::Failed to add label (attempt $attempt/3), retrying in 5 seconds..."
              sleep 5
            fi
          done

          echo "::warning::Failed to add auto:pipeline label to PR #${PR_NUMBER} after 3 attempts. Label is for search/filter only, no functional impact."
        env:
          GH_TOKEN: ${{ secrets.REPO_OWNER_PAT }}
          GH_REPO: ${{ github.repository }}
